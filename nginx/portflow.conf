# Nginx vhost for Port Flow — reverse proxy to Node.js on localhost:3000.
#
# Install:
#   sudo cp nginx/portflow.conf /etc/nginx/sites-available/portflow.conf
#   sudo sed -i 's/portflow.example.com/your.actual.domain/g' /etc/nginx/sites-available/portflow.conf
#   sudo ln -s /etc/nginx/sites-available/portflow.conf /etc/nginx/sites-enabled/portflow.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run certbot for HTTPS:
#   sudo certbot --nginx -d portflow.example.com
# Certbot auto-rewrites this file to add the SSL block + 80→443 redirect.

server {
  listen 80;
  listen [::]:80;
  server_name portflow.example.com;

  # ACME challenge directory (certbot writes here)
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  client_max_body_size 5M;

  # Gzip is fine for JSON / HTML / CSS / JS
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;

  # Pass real client IP to Next.js (for rate limit, audit log, etc.)
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;

  # Streaming-friendly timeouts (for /api/v1 long polling and webhook deliveries)
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_read_timeout 90s;
  proxy_send_timeout 90s;

  # /widget/* — allow embedding from anywhere (override default X-Frame-Options)
  location /widget/ {
    proxy_pass http://127.0.0.1:3000;
    add_header X-Frame-Options "" always;
    add_header Content-Security-Policy "frame-ancestors *" always;
  }

  # Stripe webhook — must NOT be cached, no buffering for raw signature verification
  location = /api/billing/webhook {
    proxy_pass http://127.0.0.1:3000;
    proxy_request_buffering off;
    proxy_buffering off;
    add_header Cache-Control "no-store" always;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
  }
}
